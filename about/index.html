          <p>在海畔练剑之时，不断向海船上的归客打听南海岛中可有一位神尼。但数年中问过千百个舟师海客，竟无半点音讯，便也渐渐绝了念头，心想不到十六年的期限，终是难与小龙女相会。</p>
<p>某一日风雨如晦，杨过心有所感，当下腰悬木剑，身披敝袍，一人一雕，悄然西去，自此足迹所至，踏遍了中原江南之地。</p>
